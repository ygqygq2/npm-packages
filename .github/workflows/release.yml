name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # checkout & create releases
      pull-requests: write  # changesets create/update PR
      id-token: write       # OIDC trusted publishing (no NPM_TOKEN needed)
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: |
          npm install -g pnpm
          pnpm install --ignore-scripts

      - name: Build Docs
        run: |
          # 生成到一个 docs 目录下
          pnpm run docs
          # 各自生成到各自 docs 目录下
          pnpm run docs-all

      - name: Exchange OIDC token for npm registry token
        run: |
          set -euo pipefail
          echo "Step 1: Fetching GitHub OIDC token (audience=npm:registry.npmjs.org)..."
          OIDC_RESPONSE=$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          if [ -z "$OIDC_TOKEN" ]; then
            echo "ERROR: GitHub OIDC token is empty"
            exit 1
          fi
          echo "Step 2: Exchanging OIDC token with npm registry..."
          NPM_RESPONSE=$(curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            --data-raw "{\"oidcToken\":\"${OIDC_TOKEN}\"}" \
            "https://registry.npmjs.org/-/v1/login/oidc")
          echo "npm registry response keys: $(echo "$NPM_RESPONSE" | python3 -c "import sys,json; print(list(json.load(sys.stdin).keys()))")"
          NPM_TOKEN=$(echo "$NPM_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          if [ -z "$NPM_TOKEN" ]; then
            echo "ERROR: npm token is empty after exchange"
            exit 1
          fi
          echo "::add-mask::$NPM_TOKEN"
          echo "NODE_AUTH_TOKEN=$NPM_TOKEN" >> $GITHUB_ENV
          echo "NODE_AUTH_TOKEN set successfully"

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm publish-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
